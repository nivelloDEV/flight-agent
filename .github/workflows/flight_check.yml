name: Daily Flight Price Check

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = 06:00 CET / 07:00 CEST
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  check-flights:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit price_history.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run flight price checker
        env:
          SERPAPI_KEY:   ${{ secrets.SERPAPI_KEY }}
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO:      ${{ secrets.EMAIL_TO }}
        run: python check_flights.py

      - name: Save price history to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price_history.json || true
          git diff --cached --quiet || git commit -m "Update price history $(date +'%Y-%m-%d')"
          git push || true
